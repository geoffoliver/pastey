<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>pastey</title>
  <link rel="icon" type="image/x-icon" href="/img/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/img/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/img/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/img/apple-touch-icon.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111827;
      color: #f9fafb;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-y: auto;
    }

    /* ── Dropzone ───────────────────────────────────────────────────────────── */

    #dropzone {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      width: min(560px, 90vw);
      height: min(360px, 55vh);
      border: 2px dashed #374151;
      border-radius: 20px;
      padding: 48px;
      text-align: center;
      cursor: pointer;
      user-select: none;
      transition: border-color 0.2s, background 0.2s;
    }

    #dropzone.drag-over {
      border-color: #3b82f6;
      background: rgba(59, 130, 246, 0.06);
    }

    .dz-icon { color: #4b5563; }

    .dz-text {
      font-size: 1.25rem;
      font-weight: 500;
      color: #d1d5db;
    }

    .dz-hint {
      font-size: 0.8125rem;
      color: #6b7280;
      letter-spacing: 0.01em;
    }

    kbd {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 0.75rem;
      font-family: inherit;
    }

    /* ── Preview panel ──────────────────────────────────────────────────────── */

    #preview-panel {
      width: min(680px, 95vw);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 24px 16px;
    }

    #preview-img {
      max-width: 100%;
      max-height: 52vh;
      border-radius: 10px;
      object-fit: contain;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
    }

    /* ── Options card ───────────────────────────────────────────────────────── */

    .options-card {
      width: 100%;
      background: #1f2937;
      border-radius: 14px;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .option-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .opt-label {
      font-size: 0.875rem;
      font-weight: 500;
      color: #9ca3af;
      white-space: nowrap;
    }

    select {
      background: #111827;
      color: #f9fafb;
      border: 1px solid #374151;
      border-radius: 7px;
      padding: 7px 10px;
      font-size: 0.875rem;
      cursor: pointer;
      outline: none;
      transition: border-color 0.15s;
    }
    select:focus { border-color: #3b82f6; }

    input[type="checkbox"] {
      width: 17px;
      height: 17px;
      accent-color: #3b82f6;
      cursor: pointer;
      flex-shrink: 0;
    }

    input[type="number"] {
      background: #111827;
      color: #f9fafb;
      border: 1px solid #374151;
      border-radius: 7px;
      padding: 7px 10px;
      font-size: 0.875rem;
      width: 72px;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="number"]:focus { border-color: #3b82f6; }

    #views-row { display: none; }
    #views-row.visible { display: flex; }

    /* ── Share button ───────────────────────────────────────────────────────── */

    #share-btn {
      width: 100%;
      padding: 20px;
      background: #10b981;
      color: #fff;
      font-size: 1.375rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    #share-btn:hover:not(:disabled) { background: #059669; }
    #share-btn:active:not(:disabled) { transform: scale(0.985); }
    #share-btn:disabled { background: #374151; color: #6b7280; cursor: not-allowed; }

    /* ── Progress ───────────────────────────────────────────────────────────── */

    #progress-wrap { width: 100%; }

    .progress-track {
      width: 100%;
      height: 6px;
      background: #1f2937;
      border-radius: 3px;
      overflow: hidden;
    }

    #progress-bar {
      height: 100%;
      width: 0%;
      background: #10b981;
      border-radius: 3px;
      transition: width 0.1s linear;
    }

    /* ── Error ──────────────────────────────────────────────────────────────── */

    #error-msg {
      width: 100%;
      padding: 12px 16px;
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.35);
      border-radius: 8px;
      color: #f87171;
      font-size: 0.875rem;
      text-align: center;
    }

    .replace-hint {
      font-size: 0.75rem;
      color: #374151;
    }

    /* ── Toast ──────────────────────────────────────────────────────────────── */

    #toast {
      position: fixed;
      bottom: 48px;
      left: 50%;
      transform: translateX(-50%);
      background: #064e3b;
      border: 1px solid #10b981;
      color: #d1fae5;
      padding: 12px 16px 12px 14px;
      border-radius: 10px;
      align-items: center;
      gap: 10px;
      font-size: 0.875rem;
      white-space: nowrap;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
      z-index: 100;
    }

    #toast:not([hidden]) {
      display: flex;
      animation: toast-in 0.2s ease;
    }

    @keyframes toast-in {
      from { opacity: 0; transform: translateX(-50%) translateY(6px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    #toast-close {
      background: none;
      border: none;
      color: #6ee7b7;
      cursor: pointer;
      font-size: 1.125rem;
      line-height: 1;
      padding: 0;
      margin-left: 4px;
      flex-shrink: 0;
    }
    #toast-close:hover { color: #d1fae5; }

    .gh-link {
      position: fixed;
      bottom: 16px;
      right: 20px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      color: #4b5563;
      text-decoration: none;
      transition: color 0.15s;
    }
    .gh-link:hover { color: #9ca3af; }

    .mobile-only { display: none; }

    @media (max-width: 640px) {
      body {
        align-items: flex-start;
        flex-direction: column;
        padding: 24px 24px 72px;
      }

      #dropzone {
        width: 100%;
        height: auto;
        min-height: 200px;
        padding: 40px 20px;
      }

      #preview-panel {
        width: 100%;
        padding: 16px 0;
        gap: 16px;
      }

      #preview-img { max-height: 38vh; }

      .options-card { padding: 16px; }

      /* Prevent iOS from zooming into inputs on focus */
      select,
      input[type="number"] { font-size: 1rem; }

      .desktop-only { display: none; }
      .mobile-only  { display: inline; }
    }
  </style>
</head>
<body>

  <!-- ── Initial drop / paste zone ───────────────────────────────────────── -->
  <input type="file" id="file-input" accept="image/png,image/jpeg,image/webp" hidden>
  <div id="dropzone">
    <svg class="dz-icon" width="56" height="56" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
      <circle cx="8.5" cy="8.5" r="1.5"/>
      <polyline points="21 15 16 10 5 21"/>
    </svg>
    <p class="dz-text">
      <span class="desktop-only">Paste or drag &amp; drop your image</span>
      <span class="mobile-only">Tap to select your image</span>
    </p>
    <p class="dz-hint">
      PNG, JPG, or WEBP
      <span class="desktop-only">&nbsp;&middot;&nbsp; <kbd>Cmd+V</kbd> / <kbd>Ctrl+V</kbd></span>
      <span class="mobile-only">&nbsp;&middot;&nbsp; up to 20 MB</span>
    </p>
  </div>

  <!-- ── Preview + options (shown after image is selected) ───────────────── -->
  <div id="preview-panel" hidden>
    <img id="preview-img" alt="Preview" hidden />

    <div class="options-card">
      <!-- Duration -->
      <div class="option-row">
        <span class="opt-label">Delete after</span>
        <select id="delete-after">
          <option value="1w" selected>1 week</option>
          <option value="5d">5 days</option>
          <option value="3d">3 days</option>
          <option value="1d">1 day</option>
          <option value="12h">12 hours</option>
          <option value="1h">1 hour</option>
        </select>
      </div>

      <!-- Delete-after-views -->
      <div class="option-row">
        <input type="checkbox" id="dav-check" />
        <label for="dav-check" class="opt-label" style="cursor:pointer">Delete after viewing</label>
      </div>
      <div class="option-row" id="views-row">
        <span class="opt-label" style="padding-left:27px">Delete after</span>
        <input type="number" id="dav-count" min="1" value="1" />
        <span class="opt-label">view(s)</span>
      </div>
    </div>

    <button id="share-btn">Share</button>

    <div id="progress-wrap" hidden>
      <div class="progress-track"><div id="progress-bar"></div></div>
    </div>

    <div id="error-msg" hidden></div>

    <p class="replace-hint">Paste or drop a new image to replace</p>
  </div>

  <div id="toast" hidden>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
    <span id="toast-msg">Link copied to clipboard!</span>
    <button id="toast-close" aria-label="Dismiss">&times;</button>
  </div>

  <a class="gh-link" href="https://github.com/geoffoliver/pastey" target="_blank" rel="noopener">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
      <path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.009-.868-.013-1.703-2.782.604-3.369-1.342-3.369-1.342-.454-1.155-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0 1 12 6.836a9.59 9.59 0 0 1 2.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.579.688.481C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/>
    </svg>
    geoffoliver/pastey
  </a>

  <script>
    const dropzone     = document.getElementById('dropzone');
    const fileInput    = document.getElementById('file-input');
    const previewPanel = document.getElementById('preview-panel');
    const previewImg   = document.getElementById('preview-img');
    const deleteAfter  = document.getElementById('delete-after');
    const davCheck     = document.getElementById('dav-check');
    const davCount     = document.getElementById('dav-count');
    const viewsRow     = document.getElementById('views-row');
    const shareBtn     = document.getElementById('share-btn');
    const progressWrap = document.getElementById('progress-wrap');
    const progressBar  = document.getElementById('progress-bar');
    const errorMsg     = document.getElementById('error-msg');
    const toast        = document.getElementById('toast');
    const toastMsg     = document.getElementById('toast-msg');
    const toastClose   = document.getElementById('toast-close');

    const ALLOWED_TYPES = new Set(['image/png', 'image/jpeg', 'image/webp']);
    const MAX_FILE_SIZE = 20 * 1024 * 1024; // 20 MB
    let selectedFile = null;

    // ── File handling ──────────────────────────────────────────────────────────

    function handleFile(file) {
      if (file.size > MAX_FILE_SIZE) {
        showError('File is too large. Maximum size is 20 MB.');
        return;
      }
      if (!ALLOWED_TYPES.has(file.type)) {
        showError('Only PNG, JPG, and WEBP images are allowed.');
        return;
      }
      selectedFile = file;
      const url = URL.createObjectURL(file);
      previewImg.onload = () => URL.revokeObjectURL(url);
      previewImg.src = url;
      previewImg.hidden = false;
      dropzone.hidden = true;
      previewPanel.hidden = false;
      errorMsg.hidden = true;
      progressWrap.hidden = true;
      progressBar.style.width = '0%';
      shareBtn.disabled = false;
    }

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.hidden = false;
    }

    function showToast(msg) {
      toastMsg.textContent = msg;
      toast.hidden = false;
    }

    function hideToast() {
      toast.hidden = true;
    }

    toastClose.addEventListener('click', hideToast);

    // ── File input (mobile tap-to-select) ─────────────────────────────────────

    dropzone.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) {
        hideToast();
        handleFile(fileInput.files[0]);
        fileInput.value = '';
      }
    });

    // ── Paste ──────────────────────────────────────────────────────────────────

    document.addEventListener('paste', (e) => {
      hideToast();
      const items = Array.from(e.clipboardData.items);
      const imageItem = items.find(item => item.type.startsWith('image/'));
      if (imageItem) {
        const file = imageItem.getAsFile();
        if (file) handleFile(file);
      } else if (items.length > 0) {
        showError('Only PNG, JPG, and WEBP images are allowed.');
      }
    });

    // ── Drag & drop ────────────────────────────────────────────────────────────

    document.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropzone.classList.add('drag-over');
    });

    document.addEventListener('dragleave', (e) => {
      if (!e.relatedTarget) dropzone.classList.remove('drag-over');
    });

    document.addEventListener('drop', (e) => {
      e.preventDefault();
      dropzone.classList.remove('drag-over');
      hideToast();
      const file = e.dataTransfer.files[0];
      if (file) handleFile(file);
    });

    // ── Delete-after-views toggle ──────────────────────────────────────────────

    davCheck.addEventListener('change', () => {
      viewsRow.classList.toggle('visible', davCheck.checked);
    });

    // ── Upload ─────────────────────────────────────────────────────────────────

    shareBtn.addEventListener('click', () => {
      if (!selectedFile) return;

      const formData = new FormData();
      formData.append('image', selectedFile);
      formData.append('deleteAfter', deleteAfter.value);
      if (davCheck.checked) {
        formData.append('deleteAfterViews', davCount.value);
      }

      shareBtn.disabled = true;
      progressWrap.hidden = false;
      errorMsg.hidden = true;
      progressBar.style.width = '0%';

      const xhr = new XMLHttpRequest();

      xhr.upload.addEventListener('progress', (e) => {
        if (e.lengthComputable) {
          progressBar.style.width = `${(e.loaded / e.total) * 100}%`;
        }
      });

      xhr.addEventListener('load', async () => {
        if (xhr.status === 200) {
          const { url } = JSON.parse(xhr.responseText);
          const fullUrl = window.location.origin + url;

          let copied = false;
          try { await navigator.clipboard.writeText(fullUrl); copied = true; } catch (_) {}

          window.open(fullUrl, '_blank');

          // Reset UI back to the dropzone
          selectedFile = null;
          previewImg.src = '';
          previewImg.hidden = true;
          previewPanel.hidden = true;
          dropzone.hidden = false;
          progressWrap.hidden = true;
          progressBar.style.width = '0%';
          errorMsg.hidden = true;
          shareBtn.disabled = false;
          davCheck.checked = false;
          viewsRow.classList.remove('visible');
          deleteAfter.value = '1w';

          showToast(copied ? 'Link copied to clipboard!' : 'Image shared — link opened in new tab.');
        } else {
          let msg = 'Upload failed. Please try again.';
          try { msg = JSON.parse(xhr.responseText).error ?? msg; } catch (_) {}
          showError(msg);
          progressWrap.hidden = true;
          shareBtn.disabled = false;
        }
      });

      xhr.addEventListener('error', () => {
        showError('Upload failed. Please try again.');
        progressWrap.hidden = true;
        shareBtn.disabled = false;
      });

      const csrfToken = document.cookie.split('; ').find(c => c.startsWith('pastey_csrf='))?.split('=')[1] ?? '';
      xhr.open('POST', '/upload');
      xhr.setRequestHeader('X-CSRF-Token', csrfToken);
      xhr.send(formData);
    });
  </script>
</body>
</html>
